# Prometheus Operator + Grafana + kube-state-metrics + node-exporter (pin chart in kustomization.yaml).
defaultRules:
  create: true

alertmanager:
  enabled: true

grafana:
  adminPassword: changeme-grafana-admin
  grafana.ini:
    server:
      root_url: https://grafana.tweak.codes
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-staging
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
    hosts:
      - grafana.tweak.codes
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.tweak.codes
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki.observability.svc.cluster.local:3100
      isDefault: false
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

prometheus:
  prometheusSpec:
    retention: 15d
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi

kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi

prometheus-node-exporter:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
