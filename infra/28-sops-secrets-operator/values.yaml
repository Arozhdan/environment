# isindir/sops-secrets-operator — pin chart version in kustomization.yaml.
extraEnv:
  - name: SOPS_AGE_KEY_FILE
    value: /etc/sops-age/age.agekey

secretsAsFiles:
  - name: sops-age
    mountPath: /etc/sops-age
    secretName: sops-age

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi
