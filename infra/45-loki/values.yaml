# Grafana Loki — single binary for homelab (pin chart version in kustomization.yaml).
#
# Chart defaults use object storage (S3) and expect loki.storage.bucketNames.*.
# SingleBinary on a node needs filesystem storage + replication_factor 1.
deploymentMode: SingleBinary

loki:
  # Homelab: no multi-tenant auth at Loki (Grafana/Alloy still use the cluster network).
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
    filesystem:
      chunks_directory: /var/loki/chunks
      rules_directory: /var/loki/rules
  # Satisfies schema_config without hand-maintaining TSDB/S3 buckets on a toy cluster.
  useTestSchema: true

singleBinary:
  replicas: 1
  # Filesystem backend needs a writable /var/loki (chart mounts this when enabled).
  persistence:
    enabled: true
    size: 10Gi
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

# Chart ships SimpleScalable defaults (read/write/backend replicas > 0) alongside
# the SingleBinary option. Its validate.yaml refuses if both have replicas, so we
# have to zero out every non-SingleBinary component explicitly.
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0

gateway:
  enabled: false
