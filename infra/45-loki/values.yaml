# Grafana Loki — single binary for homelab (pin chart version in kustomization.yaml).
deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  persistence:
    enabled: false
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi

gateway:
  enabled: false
