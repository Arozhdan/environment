# Bootstrap: self-managed Argo CD from Helm + values in this repo.
# Prerequisites: Argo CD already installed (you have it) OR apply namespace first.
# Replace repoURL with the exact repository URL registered in Argo CD (HTTPS or SSH).
---
apiVersion: v1
kind: Namespace
metadata:
  name: argocd
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-cd
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argo-cd
      targetRevision: 7.7.22
      helm:
        valueFiles:
          - $values/bootstrap/argocd/values.yaml
    - repoURL: https://github.com/Arozhdan/environment.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
