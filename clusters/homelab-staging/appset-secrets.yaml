# ApplicationSet: one Argo CD Application per directory under secrets/*.
# Use this for SOPS-encrypted `SopsSecret` manifests so they are reconciled by GitOps.
# On first bootstrap, add `secrets/*` directories only after the SOPS operator is healthy.
# Replace repoURL with the exact repository URL registered in Argo CD (HTTPS or SSH).
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: homelab-staging-secrets
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/arozhdan/environment.git
        revision: main
        directories:
          - path: secrets/*
  template:
    metadata:
      name: 'secret-{{ .path.basename }}'
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      annotations:
        argocd.argoproj.io/sync-wave: "30"
    spec:
      project: default
      source:
        repoURL: https://github.com/arozhdan/environment.git
        targetRevision: main
        path: '{{ .path }}'
      destination:
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
