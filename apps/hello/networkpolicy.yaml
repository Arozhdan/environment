# Default-deny style: only allow ingress-nginx to reach the workload (namespace must support NetworkPolicy).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hello-from-ingress-nginx
  namespace: hello
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: hello
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8080
          protocol: TCP
